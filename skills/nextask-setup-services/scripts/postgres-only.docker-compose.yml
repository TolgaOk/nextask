services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: nextask
      POSTGRES_DB: nextask
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - tcp_keepalives_idle=60
      - -c
      - tcp_keepalives_interval=10
      - -c
      - tcp_keepalives_count=3
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextask"]
      interval: 5s
      retries: 5

volumes:
  pgdata:
