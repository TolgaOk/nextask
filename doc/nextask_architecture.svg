<svg width="100%" viewBox="0 0 680 330" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
/* Logs: animated dashes only */
@keyframes dash { to { stroke-dashoffset: -20; } }
.dashed-flow { animation: dash 0.8s linear infinite; }

/* 9s cycle: CLI → junction → DB+git → worker junction → worker → 1s pause */
@keyframes step1 {
  0%   { offset-distance: 0%; opacity: 0; }
  2%   { opacity: 1; }
  15%  { offset-distance: 100%; opacity: 1; }
  17%  { opacity: 0; }
  100% { opacity: 0; }
}
@keyframes step2a {
  0%, 17%  { offset-distance: 0%; opacity: 0; }
  19%  { opacity: 1; }
  33%  { offset-distance: 100%; opacity: 1; }
  35%  { opacity: 0; }
  100% { opacity: 0; }
}
@keyframes step2b {
  0%, 17%  { offset-distance: 0%; opacity: 0; }
  19%  { opacity: 1; }
  39%  { offset-distance: 100%; opacity: 1; }
  41%  { opacity: 0; }
  100% { opacity: 0; }
}
@keyframes step3a {
  0%, 44% { offset-distance: 0%; opacity: 0; }
  46%  { opacity: 1; }
  60%  { offset-distance: 100%; opacity: 1; }
  62%  { opacity: 0; }
  100% { opacity: 0; }
}
@keyframes step3b {
  0%, 44% { offset-distance: 0%; opacity: 0; }
  46%  { opacity: 1; }
  64%  { offset-distance: 100%; opacity: 1; }
  66%  { opacity: 0; }
  100% { opacity: 0; }
}
@keyframes step4 {
  0%, 66% { offset-distance: 0%; opacity: 0; }
  68%  { opacity: 1; }
  78%  { offset-distance: 100%; opacity: 1; }
  80%  { opacity: 0; }
  100% { opacity: 0; }
}

/* Worker border animations */
@keyframes worker-active { to { stroke-dashoffset: -20; } }
@keyframes worker-activate {
  0%, 77% { opacity: 0; }
  78%  { opacity: 1; stroke-dashoffset: 0; }
  95%  { opacity: 1; stroke-dashoffset: -100; }
  96%, 100% { opacity: 0; }
}
@keyframes worker-solid-hide {
  0%, 77% { opacity: 1; }
  78%, 95% { opacity: 0; }
  96%, 100% { opacity: 1; }
}

.dot-cli-to-junc   { offset-path: path("M 142 160 L 200 160"); animation: step1 9s ease-in-out infinite; }
.dot-junc-to-db    { offset-path: path("M 200 160 L 266 160"); animation: step2a 9s ease-in-out infinite; }
.dot-junc-to-git   { offset-path: path("M 200 162 L 200 268 L 266 268"); animation: step2b 9s ease-in-out infinite; }
.dot-db-to-wjunc   { offset-path: path("M 414 160 L 476 160"); animation: step3a 9s ease-in-out infinite; }
.dot-git-to-wjunc  { offset-path: path("M 412 268 L 476 268 L 476 162"); animation: step3b 9s ease-in-out infinite; }
.dot-wjunc-to-work { offset-path: path("M 476 160 L 538 160"); animation: step4 9s ease-in-out infinite; }
.worker-idle   { }
.worker-busy   { stroke-dasharray: 6 4; animation: worker-active 0.8s linear infinite; }
.worker-recv   { stroke-dasharray: 6 4; opacity: 0; animation: worker-activate 9s ease-in-out infinite; }
</style>
</defs>

